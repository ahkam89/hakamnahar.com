<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interest</title>

<link rel="icon" type="image/png" href="favicon.png">
  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #EEEEEE;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.page {
  max-width: 700px;
  width: 100%;
  padding: 24px 0 48px;
}

h1 {
  font-size: 24px;
  color: #000000;
  text-align: center;
  margin-bottom: 28px;
}

/* NAV */

.top-nav {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.nav-group {
  display: inline-flex;
  border: 1px solid #334155;
  border-radius: 12px;
  overflow: hidden;
}

.nav-btn {
  padding: 10px 18px;
  text-decoration: none;
  color: #000000;
  font-weight: 600;
  border-right: 1px solid #334155;
  transition: all 0.2s ease;
}

.nav-btn:last-child {
  border-right: none;
}

.nav-btn:hover {
  background: #000000;
  color: #FFFFFF;
  transform: translateY(-2px);
}

/* ACTIVE PAGE */

.nav-btn.active {
  background: #000000;
  color: #FFFFFF;
}

/* CONTENT */

.content {
  text-align: left;
}

p {
  font-size: 16px;
  line-height: 1.6;
  color: #000000;
}

  .stat-row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 14px;
}

.stat-bar {
  height: 6px;
  background: #dddddd;
  border-radius: 4px;
  margin-bottom: 8px;
}

.stat-bar div {
  height: 6px;
  background: #000000;
  border-radius: 4px;
}

</style>
</head>

<body>

<div class="page">

<h1>Interest</h1>

<div class="top-nav">
  <div class="nav-group">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="work.html" class="nav-btn">Work</a>
    <a href="interest.html" class="nav-btn active">Interest</a>
  </div>
</div>

<div class="content">
  <p>This page will show my hobbies and interests.</p>

  <h2>Gaming</h2>

<div class="stat-row"><span>Creativity</span><span>90</span></div>
<div class="stat-bar"><div style="width:90%"></div></div>

<div class="stat-row"><span>Exploration</span><span>86</span></div>
<div class="stat-bar"><div style="width:86%"></div></div>
