<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interest</title>

<link rel="icon" type="image/png" href="favicon.png">
  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #EEEEEE;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.page {
  max-width: 700px;
  width: 100%;
  padding: 24px 0 48px;
}

h1 {
  font-size: 24px;
  color: #000000;
  text-align: center;
  margin-bottom: 28px;
}

/* NAV */

.top-nav {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.nav-group {
  display: inline-flex;
  border: 1px solid #334155;
  border-radius: 12px;
  overflow: hidden;
}

.nav-btn {
  padding: 10px 18px;
  text-decoration: none;
  color: #000000;
  font-weight: 600;
  border-right: 1px solid #334155;
  transition: all 0.2s ease;
}

.nav-btn:last-child {
  border-right: none;
}

.nav-btn:hover {
  background: #000000;
  color: #FFFFFF;
  transform: translateY(-2px);
}

/* ACTIVE PAGE */

.nav-btn.active {
  background: #000000;
  color: #FFFFFF;
}

/* CONTENT */

.content {
  text-align: left;
}

p {
  font-size: 16px;
  line-height: 1.6;
  color: #000000;
}

  .stat-row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 14px;
}

.stat-bar {
  height: 7px;
  background: #dddddd;
  border-radius: 4px;
  margin-bottom: 8px;
}

.stat-bar div {
  height: 6px;
  background: #000000;
  border-radius: 4px;
}

.interest-art{
width:100%;
max-width:420px;
display:block;
margin:40px auto 24px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
transition:transform 0.35s ease, box-shadow 0.35s ease;
}

.interest-art:hover{
transform:translateY(-6px);
box-shadow:0 30px 70px rgba(0,0,0,0.22);
}

.interest-role{
font-size:14px;
color:#777777;
margin-top:-6px;
margin-bottom:18px;
text-align:center;
}

.interest-section{
margin-top:70px;
animation:fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
  text-align:center;
  margin-top:10px;
}

.stat-bar div{
  width:0;
  transition:width 1s ease;
}

@keyframes growBar{
  from{
    width:0;
  }
}

</style>
</head>

<body>

<div class="page">

<h1>Interest</h1>

<div class="top-nav">
  <div class="nav-group">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="work.html" class="nav-btn">Work</a>
    <a href="interest.html" class="nav-btn active">Interest</a>
  </div>
</div>

<p>
Outside of work, I enjoy exploring games, music, and film.
Each offers a different way to experience creativity, storytelling, and systems.
</p>

<hr>

<section class="interest-section">

<img src="images/gaming-strategist.png" alt="Gaming character" class="interest-art">

<h2>Gaming</h2>
<p class="interest-role">The Strategist</p>

<div class="stat-row"><span>Creativity</span><span>90</span></div>
<div class="stat-bar"><div data-width="90%"></div></div>

<div class="stat-row"><span>Exploration</span><span>86</span></div>
<div class="stat-bar"><div data-width="86%"></div></div>

<div class="stat-row"><span>Game Knowledge</span><span>82</span></div>
<div class="stat-bar"><div data-width="82%"></div></div>

<div class="stat-row"><span>Technical Curiosity</span><span>78</span></div>
<div class="stat-bar"><div data-width="78%"></div></div>

<div class="stat-row"><span>Optimization</span><span>74</span></div>
<div class="stat-bar"><div data-width="74%"></div></div>

<div class="stat-row"><span>Adaptability</span><span>70</span></div>
<div class="stat-bar"><div data-width="70%"></div></div>

</section>


</div>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const bars = entry.target.querySelectorAll('.stat-bar div');
      bars.forEach((bar, index) => {
        setTimeout(() => {
          bar.style.width = bar.dataset.width;
        }, index * 120);
      });
      observer.unobserve(entry.target);
    }
  });
}, {
  threshold: 0.7
});

document.querySelectorAll('.interest-section').forEach(section => {
  observer.observe(section);
});
</script>
</body>
</html>
